name: Atualizar site

on:
  push:
    branches: [main]
    paths:
      - "OB_OS.xlsx"
      - "p_e.xlsx"
      - "index.html"
      - "build.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install openpyxl

      - name: Gerar data.json a partir do Excel
        run: python build.py OB_OS.xlsx p_e.xlsx

      - name: Montar pasta do site
        run: |
          mkdir -p _site
          cp index.html data.json _site/
          cp pe.json _site/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
